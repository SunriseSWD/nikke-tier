<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIKKE 티어표 — 승리의 여신 니케 공략</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d24;
    --border: rgba(255,255,255,0.07);
    --text: #e8e6f0;
    --muted: #7a7890;
    --accent: #c8a8ff;
    --accent2: #7b5ea7;
    --tier0: #ff6b6b;
    --tier1: #ffa94d;
    --tier2: #74c0fc;
    --tier3: #868e96;
    --burst1: #ff8787;
    --burst2: #a9e34b;
    --burst3: #74c0fc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }
  body::before { content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 800px; height: 400px; background: radial-gradient(ellipse, rgba(123,94,167,0.15) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  header { position: relative; z-index: 1; padding: 40px 24px 32px; text-align: center; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Rajdhani', sans-serif; font-size: 36px; font-weight: 700; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
  .logo span { color: #fff; }
  .subtitle { margin-top: 6px; font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .update-badge { display: inline-block; margin-top: 12px; padding: 4px 12px; background: rgba(200,168,255,0.1); border: 1px solid rgba(200,168,255,0.25); border-radius: 20px; font-size: 12px; color: var(--accent); }
  .nav { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
  .nav a { padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); text-decoration: none; font-size: 13px; transition: all 0.2s; }
  .nav a:hover { border-color: var(--accent2); color: var(--text); }
  .nav a.active { background: rgba(200,168,255,0.12); border-color: var(--accent); color: var(--accent); }
  .controls { position: relative; z-index: 1; display: flex; gap: 8px; padding: 20px 24px; justify-content: center; flex-wrap: wrap; }
  .tab-btn { padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .tab-btn:hover { border-color: var(--accent2); color: var(--text); }
  .tab-btn.active { background: rgba(200,168,255,0.12); border-color: var(--accent); color: var(--accent); }
  .search-wrap { position: relative; z-index: 1; padding: 0 24px 20px; max-width: 480px; margin: 0 auto; }
  .search-wrap input { width: 100%; padding: 10px 16px 10px 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
  main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 16px 80px; }
  .tier-section { margin-bottom: 12px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .tier-header { display: flex; align-items: center; gap: 16px; padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tier-badge { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; min-width: 36px; }
  .tier-0 .tier-badge { color: var(--tier0); }
  .tier-1 .tier-badge { color: var(--tier1); }
  .tier-2 .tier-badge { color: var(--tier2); }
  .tier-3 .tier-badge { color: var(--tier3); }
  .tier-label { font-size: 14px; color: var(--muted); flex: 1; }
  .tier-count { font-size: 12px; color: var(--muted); background: var(--surface2); padding: 2px 10px; border-radius: 12px; }
  .tier-body { background: var(--border); display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; }
  .char-card { background: var(--surface); padding: 16px 14px; cursor: pointer; transition: background 0.15s; }
  .char-card:hover { background: var(--surface2); }
  .char-card.hidden { display: none; }
  .char-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .char-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .tag-burst1 { background: rgba(255,135,135,0.15); color: var(--burst1); }
  .tag-burst2 { background: rgba(169,227,75,0.15); color: var(--burst2); }
  .tag-burst3 { background: rgba(116,192,252,0.15); color: var(--burst3); }
  .tag-attacker { background: rgba(255,107,107,0.12); color: #ff8787; }
  .tag-supporter { background: rgba(200,168,255,0.12); color: var(--accent); }
  .tag-defender { background: rgba(116,192,252,0.12); color: #74c0fc; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid rgba(200,168,255,0.2); border-radius: 20px; padding: 32px; max-width: 480px; width: 100%; transform: scale(0.95); transition: transform 0.2s; position: relative; }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-close { position: absolute; top: 16px; right: 16px; background: var(--surface2); border: none; color: var(--muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
  .modal-close:hover { color: var(--text); }
  .modal-name { font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .modal-tier { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; }
  .modal-desc { font-size: 13px; color: var(--text); line-height: 1.7; padding: 12px 16px; background: var(--surface2); border-radius: 10px; border-left: 3px solid var(--accent2); }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  @media (max-width: 600px) { .logo { font-size: 26px; } .tier-body { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); } }
</style>
</head>

  <div class="update-badge">✦ 2026년 3월 기준 (벨벳 버전)</div>
  <div class="nav">

<div class="search-wrap">

<main id="tierList"></main>

  </div>

let currentMode='pve', searchQuery='';

function setMode(mode,e){

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

  document.getElementById('searchInput').value='';
  searchQuery='';
  render();
}

function search(val){ searchQuery=val.trim().toLowerCase(); render(); }

function roleTag(r){ return ({attacker:['tag-attacker','어태커'],supporter:['tag-supporter','서포터'],defender:['tag-defender','디펜더']})[r]||['',r]; }
function burstTag(b){ return ({1:['tag-burst1','B1'],2:['tag-burst2','B2'],3:['tag-burst3','B3']})[b]||['','B?']; }

function openModal(idx, tier){
  const tiers=data[currentMode];
  const tierObj=tiers.find(t=>t.tier===tier);
  const char=tierObj.chars[idx];
  const [rc,rl]=roleTag(char.role);
  const [bc,bl]=burstTag(char.burst);
  document.getElementById('modalName').textContent=char.name;
  document.getElementById('modalTier').textContent=tier+'티어 · '+(currentMode==='pve'?'PvE':'PvP');
  document.getElementById('modalDesc').textContent=char.desc;
  document.getElementById('modalTags').innerHTML=`<span class="tag ${bc}">버스트 ${char.burst}</span><span class="tag ${rc}">${rl}</span>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e){ if(e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modalOverlay').classList.remove('open'); }

function render(){
  const list=document.getElementById('tierList');
  const tiers=data[currentMode];
  let any=false;
  list.innerHTML=tiers.map(tier=>{
    const visible=searchQuery?tier.chars.filter(c=>c.name.toLowerCase().includes(searchQuery)):tier.chars;
    if(!visible.length&&searchQuery) return '';
    any=true;
    const cards=tier.chars.map((char,i)=>{
      const hidden=searchQuery&&!char.name.toLowerCase().includes(searchQuery);
      const [rc,rl]=roleTag(char.role);
      const [bc,bl]=burstTag(char.burst);
      return `<div class="char-card tier-${tier.tier}${hidden?' hidden':''}" onclick="openModal(${i},'${tier.tier}')">
        <div class="char-name">${char.name}</div>
        <div class="char-tags"><span class="tag ${bc}">${bl}</span><span class="tag ${rc}">${rl}</span></div>
      </div>`;
    }).join('');
    return `<div class="tier-section tier-${tier.tier}">
      <div class="tier-header">
        <span class="tier-badge">${tier.tier}T</span>
        <span class="tier-label">${tier.label}</span>
        <span class="tier-count">${tier.chars.length}명</span>
      </div>
      <div class="tier-body">${cards}</div>
    </div>`;
  }).join('');
  if(!any) list.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div>'${searchQuery}'에 해당하는 니케가 없어요</div></div>`;
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});
render();
</script>
</body>
</html>
