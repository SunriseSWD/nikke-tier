<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIKKE 파티 추천 — 승리의 여신 니케</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #1a1d24;
    --border: rgba(255,255,255,0.07); --text: #e8e6f0; --muted: #7a7890;
    --accent: #c8a8ff; --accent2: #7b5ea7;
    --burst1: #ff8787; --burst2: #a9e34b; --burst3: #74c0fc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }
  body::before { content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 800px; height: 400px; background: radial-gradient(ellipse, rgba(123,94,167,0.15) 0%, transparent 70%); pointer-events: none; z-index: 0; }

  /* 헤더 */
  header { position: relative; z-index: 1; padding: 40px 24px 32px; text-align: center; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Rajdhani', sans-serif; font-size: 36px; font-weight: 700; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
  .logo span { color: #fff; }
  .subtitle { margin-top: 6px; font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .nav { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
  .nav a { padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); text-decoration: none; font-size: 13px; transition: all 0.2s; }
  .nav a:hover { border-color: var(--accent2); color: var(--text); }
  .nav a.active { background: rgba(200,168,255,0.12); border-color: var(--accent); color: var(--accent); }

  /* 메인 레이아웃 */
  .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 32px 16px 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 700px) { .container { grid-template-columns: 1fr; } }

  /* 섹션 카드 */
  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .section-title { padding: 16px 20px; border-bottom: 1px solid var(--border); font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .section-body { padding: 16px; }

  /* 콘텐츠 탭 */
  .content-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .content-tab { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 500; transition: all 0.2s; }
  .content-tab:hover { color: var(--text); border-color: var(--accent2); }
  .content-tab.active { background: rgba(200,168,255,0.12); border-color: var(--accent); color: var(--accent); }

  /* 캐릭터 선택 그리드 */
  .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; max-height: 400px; overflow-y: auto; padding-right: 4px; }
  .char-grid::-webkit-scrollbar { width: 4px; }
  .char-grid::-webkit-scrollbar-track { background: var(--surface2); border-radius: 2px; }
  .char-grid::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 2px; }

  .char-btn {
    padding: 8px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .char-btn:hover { border-color: var(--accent2); color: var(--text); }
  .char-btn.selected { background: rgba(200,168,255,0.15); border-color: var(--accent); color: var(--accent); }

  .burst-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 3px; }
  .b1 { background: var(--burst1); }
  .b2 { background: var(--burst2); }
  .b3 { background: var(--burst3); }

  /* 선택된 캐릭터 */
  .selected-count { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .selected-count span { color: var(--accent); font-weight: 700; }

  /* 추천 버튼 */
  .recommend-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent2), #5a3d8a);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 16px;
    letter-spacing: 1px;
  }
  .recommend-btn:hover { opacity: 0.85; }
  .recommend-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 결과 영역 */
  .result-area { min-height: 300px; }
  .result-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; color: var(--muted); text-align: center; gap: 12px; }
  .result-empty-icon { font-size: 48px; opacity: 0.4; }

  .party-result { margin-bottom: 20px; }
  .party-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; }
  .party-members { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .member-card {
    padding: 8px 12px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .member-card.highlight { border-color: var(--accent2); background: rgba(200,168,255,0.08); }

  .party-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 10px;
    border-left: 3px solid var(--accent2);
  }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* 조건별 추천 */
  .purpose-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .purpose-btn {
    padding: 12px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.5;
  }
  .purpose-btn:hover { border-color: var(--accent2); color: var(--text); }
  .purpose-btn.active { background: rgba(200,168,255,0.12); border-color: var(--accent); color: var(--accent); }
  .purpose-icon { font-size: 20px; display: block; margin-bottom: 4px; }

  .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
  .tag-b1 { background: rgba(255,135,135,0.15); color: var(--burst1); }
  .tag-b2 { background: rgba(169,227,75,0.15); color: var(--burst2); }
  .tag-b3 { background: rgba(116,192,252,0.15); color: var(--burst3); }
  .tag-core { background: rgba(200,168,255,0.15); color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo"><span>NIKKE</span> 파티 추천</div>
  <div class="subtitle">승리의 여신 니케 · 내 캐릭터로 최적 파티 구성</div>
  <div class="nav">
    <a href="index.html">티어표</a>
    <a href="party.html" class="active">파티 추천</a>

        <div class="content-tabs">
          <button class="content-tab active" onclick="filterBurst(0,this)">전체</button>

        <div class="char-grid" id="charGrid"></div>

    </div>

    <!-- 목적 선택 -->
    <div class="section-card">

      <div class="section-body">

          <button class="purpose-btn" onclick="setPurpose('raid',this)">

        </div>
        <button class="recommend-btn" onclick="recommend()" id="recBtn">파티 추천받기 →</button>
      </div>
    </div>
  </div>

  <!-- 오른쪽: 결과 -->
  <div class="section-card">
    <div class="section-title">추천 결과</div>
    <div class="section-body result-area" id="resultArea">

let selected = new Set();
let currentBurstFilter = 0;
let currentPurpose = 'story';

function filterBurst(burst, el) {
  currentBurstFilter = burst;
  document.querySelectorAll('.content-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCharGrid();
}

function setPurpose(purpose, el) {
  currentPurpose = purpose;
  document.querySelectorAll('.purpose-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function renderCharGrid() {
  const grid = document.getElementById('charGrid');
  const filtered = currentBurstFilter === 0 ? allChars : allChars.filter(c => c.burst === currentBurstFilter);
  grid.innerHTML = filtered.map(char => {
    const bColor = ['b1','b2','b3'][char.burst-1];
    const isSel = selected.has(char.name);
    return `<button class="char-btn${isSel?' selected':''}" onclick="toggleChar('${char.name}')">
      <span class="burst-dot ${bColor}"></span>${char.name}
    </button>`;
  }).join('');
}

function toggleChar(name) {
  if (selected.has(name)) selected.delete(name);
  else selected.add(name);
  document.getElementById('selCount').textContent = selected.size;
  renderCharGrid();
}

function recommend() {
  const result = document.getElementById('resultArea');
  if (selected.size === 0) {
    result.innerHTML = `<div class="result-empty"><div class="result-empty-icon">⚠️</div><div>보유 캐릭터를 먼저 선택해주세요!</div></div>`;
    return;
  }

  const preset = presets[currentPurpose];

  // 각 슬롯에서 보유 캐릭터 중 최적 선택 (중복 방지)
  const usedChars = new Set();
  const party = preset.priority.map(slot => {
    const match = slot.candidates.find(c => selected.has(c) && !usedChars.has(c));
    if (match) usedChars.add(match);
    return { name: match || null, burst: slot.burst, fallback: slot.candidates[0] };
  });

  // 보유 중인 파티원
  const haveAll = party.every(p => p.name);
  const haveCount = party.filter(p => p.name).length;

  // 결과 렌더
  let html = '';

  // 추천 파티
  html += `<div class="party-result">`;
  html += `<div class="party-label">추천 파티 — ${preset.label}</div>`;
  html += `<div class="party-members">`;
  party.forEach((p, i) => {
    const bClass = `tag-b${p.burst}`;
    if (p.name) {
      html += `<div class="member-card highlight">
        <span class="tag ${bClass}">B${p.burst}</span>
        ${p.name}
      </div>`;
    } else {
      html += `<div class="member-card" style="opacity:0.5; border-style:dashed">
        <span class="tag ${bClass}">B${p.burst}</span>
        <span style="color:var(--muted)">${p.fallback} 필요</span>
      </div>`;
    }
  });
  html += `</div>`;

  // 완성도 표시
  const pct = Math.round((haveCount / 5) * 100);
  html += `<div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px">
      <span>파티 완성도</span><span style="color:var(--accent)">${haveCount}/5명 보유 (${pct}%)</span>
    </div>
    <div style="height:4px;background:var(--surface2);border-radius:2px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:var(--accent2);border-radius:2px;transition:width 0.5s"></div>
    </div>
  </div>`;

  // 파티 설명 (보유 상황에 따라 다름)
  if (haveAll) {
    html += `<div class="party-desc">✅ 완벽한 파티입니다! ${preset.ideal.desc}</div>`;
  } else {
    const missing = party.filter(p => !p.name).map(p => p.fallback);
    html += `<div class="party-desc">현재 보유 캐릭터로 구성한 최적 파티입니다. 없는 자리는 점선으로 표시했어요.<br><br>🎯 <strong>우선 획득 추천:</strong> ${missing.join(', ')}</div>`;
  }
  html += `</div>`;

  // 구분선
  html += `<div class="divider"></div>`;

  // 이상적인 최강 파티
  html += `<div class="party-result">`;
  html += `<div class="party-label" style="color:var(--accent)">★ 최강 이상 파티</div>`;
  html += `<div class="party-members">`;
  preset.ideal.members.forEach((name, i) => {
    const char = allChars.find(c => c.name === name);
    const burst = char ? char.burst : 3;
    const bClass = `tag-b${burst}`;
    const isOwned = selected.has(name);
    html += `<div class="member-card${isOwned?' highlight':''}">
      <span class="tag ${bClass}">B${burst}</span>
      ${name}${isOwned?' ✓':''}
    </div>`;
  });
  html += `</div>`;
  html += `<div class="party-desc">${preset.ideal.desc}</div>`;
  html += `</div>`;

  result.innerHTML = html;
}

// 초기화
renderCharGrid();
</script>
</body>
</html>
